<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ArcRho Admin Control</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f4f7fb;
      color: #172033;
    }

    body {
      margin: 0;
      min-width: 720px;
    }

    .app {
      box-sizing: border-box;
      min-height: 100vh;
      max-width: 1500px;
      margin: 0 auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 650;
    }

    .path {
      margin-top: 6px;
      color: #5d6a7f;
      font-size: 13px;
      word-break: break-all;
    }

    .status {
      min-width: 180px;
      text-align: right;
      color: #2563eb;
      font-size: 13px;
      padding-top: 5px;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(280px, 340px) minmax(900px, 1fr);
      gap: 18px;
      align-items: start;
      flex: 1;
      min-height: 0;
    }

    section {
      background: #ffffff;
      border: 1px solid #dfe6ef;
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(20, 38, 70, 0.06);
      overflow: hidden;
    }

    h2 {
      margin: 0;
      padding: 13px 16px;
      font-size: 15px;
      font-weight: 650;
      border-bottom: 1px solid #e6edf5;
      background: #fbfcfe;
    }

    .section-body {
      padding: 14px 16px 16px;
    }

    .instances-panel {
      height: 100%;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .instances-panel .section-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .field {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #edf2f7;
    }

    .field:last-child {
      border-bottom: 0;
    }

    .panel-actions {
      display: flex;
      justify-content: flex-end;
      padding-top: 12px;
    }

    label {
      font-size: 13px;
      color: #28364d;
    }

    input[type="text"], input[type="number"], select {
      width: 210px;
      box-sizing: border-box;
      border: 1px solid #cdd7e4;
      border-radius: 6px;
      padding: 7px 9px;
      font: inherit;
      font-size: 13px;
      color: #152238;
      background: #ffffff;
    }

    input.root {
      width: 100%;
    }

    .root-row {
      grid-template-columns: 90px 1fr;
    }

    .switch {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      user-select: none;
    }

    .switch input {
      width: 18px;
      height: 18px;
      accent-color: #2563eb;
    }

    .toolbar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .toolbar label {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin-right: auto;
      color: #59677c;
      white-space: nowrap;
    }

    .toolbar select {
      width: 130px;
      padding: 6px 8px;
    }

    button {
      border: 1px solid #c9d5e5;
      border-radius: 6px;
      background: #ffffff;
      color: #172033;
      padding: 7px 10px;
      font: inherit;
      font-size: 13px;
      cursor: pointer;
    }

    button:hover {
      background: #f1f5fb;
    }

    button.danger {
      border-color: #f3b6b6;
      color: #b42318;
    }

    button.primary {
      border-color: #93b7f8;
      color: #1d4ed8;
    }

    table {
      width: 100%;
      min-width: 900px;
      border-collapse: collapse;
      font-size: 13px;
    }

    .table-wrap {
      flex: 1;
      min-height: 0;
      overflow: auto;
    }

    th, td {
      text-align: left;
      border-bottom: 1px solid #edf2f7;
      padding: 9px 8px;
      vertical-align: middle;
    }

    th {
      color: #59677c;
      font-weight: 600;
      background: #fbfcfe;
    }

    .sort-button {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border: 0;
      background: transparent;
      padding: 0;
      color: inherit;
      font: inherit;
      font-weight: inherit;
    }

    .sort-button:hover {
      background: transparent;
      color: #1d4ed8;
    }

    .sort-mark {
      width: 0;
      height: 0;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      opacity: 0;
    }

    .sort-button.sorted .sort-mark {
      opacity: 1;
    }

    .sort-button.asc .sort-mark {
      border-bottom: 6px solid currentColor;
    }

    .sort-button.desc .sort-mark {
      border-top: 6px solid currentColor;
    }

    td.age {
      text-align: right;
      white-space: nowrap;
    }

    .role-cell {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
    }

    .role-icon {
      width: 18px;
      height: 18px;
      flex: 0 0 18px;
      display: inline-block;
    }

    .group-row td {
      background: #f6f9fd;
      color: #334155;
      font-weight: 650;
      border-top: 1px solid #dfe6ef;
    }

    .group-count {
      color: #64748b;
      font-weight: 500;
      margin-left: 7px;
    }

    .pill {
      display: inline-flex;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 12px;
      background: #e8f7ef;
      color: #087443;
    }

    .pill.stale {
      background: #fff4e5;
      color: #b54708;
    }

    .empty {
      color: #69778c;
      text-align: center;
      padding: 26px 8px;
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>ArcRho Admin Control</h1>
        <div id="configPath" class="path"></div>
      </div>
      <div id="status" class="status">Loading...</div>
    </header>

    <div class="grid">
      <div>
        <section>
          <h2>General</h2>
          <div class="section-body">
            <div class="field">
              <label for="configVersion">Config Version</label>
              <input id="configVersion" type="text" data-path="config_version">
            </div>
            <div class="field root-row">
              <label for="root">Project Root</label>
              <input id="root" class="root" type="text" data-path="root">
            </div>
            <div class="panel-actions">
              <button id="resetConfig">Reset</button>
            </div>
          </div>
        </section>

        <section style="margin-top: 18px;">
          <h2>Engine</h2>
          <div class="section-body">
            <div class="field">
              <label for="engineKillAll">Stop All Engines</label>
              <span class="switch"><input id="engineKillAll" type="checkbox" data-path="apps.engine.kill_all"></span>
            </div>
          </div>
        </section>

        <section style="margin-top: 18px;">
          <h2>Orchestrator</h2>
          <div class="section-body">
            <div class="field">
              <label for="orchestratorKillAll">Stop Orchestrator</label>
              <span class="switch"><input id="orchestratorKillAll" type="checkbox" data-path="apps.orchestrator.kill_all"></span>
            </div>
            <div class="field">
              <label for="autoCreateWorkers">Auto Create Engine Workers</label>
              <span class="switch"><input id="autoCreateWorkers" type="checkbox" data-path="apps.orchestrator.auto_create_workers"></span>
            </div>
            <div class="field">
              <label for="maxWorkers">Max Engine Workers</label>
              <input id="maxWorkers" type="number" min="0" max="100" data-path="apps.orchestrator.max_workers">
            </div>
            <div class="panel-actions">
              <button class="primary" id="startOrchestrator">Start New Instance</button>
            </div>
          </div>
        </section>

        <section style="margin-top: 18px;">
          <h2>Bridge</h2>
          <div class="section-body">
            <div class="field">
              <label for="bridgeKillAll">Stop Bridge</label>
              <span class="switch"><input id="bridgeKillAll" type="checkbox" data-path="apps.bridge.kill_all"></span>
            </div>
            <div class="field">
              <label for="autoCreateBridge">Auto Create Bridge Instance</label>
              <span class="switch"><input id="autoCreateBridge" type="checkbox" data-path="apps.bridge.auto_create_instance"></span>
            </div>
            <div class="field">
              <label for="maxBridgeInstances">Max Bridge Instances</label>
              <input id="maxBridgeInstances" type="number" min="0" max="1" data-path="apps.bridge.max_instances">
            </div>
            <div class="field">
              <label for="bridgeWorkerKillAll">Stop Bridge Worker</label>
              <span class="switch"><input id="bridgeWorkerKillAll" type="checkbox" data-path="apps.bridge_worker.kill_all"></span>
            </div>
            <div class="panel-actions">
              <button class="primary" id="startBridge">Start New Instance</button>
            </div>
          </div>
        </section>
      </div>

      <section class="instances-panel">
        <h2>Live Instances</h2>
        <div class="section-body">
          <div class="toolbar">
            <label for="groupByInstances">Group by
              <select id="groupByInstances">
                <option value="">None</option>
                <option value="role_label">Role</option>
                <option value="user">User</option>
              </select>
            </label>
            <button class="primary" id="refreshInstances">Refresh</button>
            <button id="clearStaleInstances">Clear Stale</button>
            <button id="openConfigFolder">Open Config Folder</button>
            <button class="danger" id="shutdownServer">Close Admin Server</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th><button class="sort-button" data-sort="role_label">Role<span class="sort-mark"></span></button></th>
                  <th><button class="sort-button" data-sort="user">User<span class="sort-mark"></span></button></th>
                  <th><button class="sort-button" data-sort="server">Instance ID<span class="sort-mark"></span></button></th>
                  <th><button class="sort-button" data-sort="created">Created<span class="sort-mark"></span></button></th>
                  <th><button class="sort-button" data-sort="last_seen">Last Seen<span class="sort-mark"></span></button></th>
                  <th><button class="sort-button" data-sort="age_seconds">Age<span class="sort-mark"></span></button></th>
                  <th><button class="sort-button" data-sort="status">Status<span class="sort-mark"></span></button></th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="instancesBody">
                <tr><td class="empty" colspan="8">Loading...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const statusEl = document.getElementById("status");
    const configPathEl = document.getElementById("configPath");
    const instancesBody = document.getElementById("instancesBody");
    const groupByInstances = document.getElementById("groupByInstances");
    const saveTimers = new Map();
    const instanceColumnCount = 8;
    let latestInstances = [];
    let sortState = {column: "role_label", direction: "asc"};

    const roleIcons = {
      admin: `
        <svg class="role-icon" viewBox="0 0 24 24" aria-hidden="true">
          <rect x="4.5" y="5" width="15" height="14" rx="3" fill="none" stroke="#1f3b67" stroke-width="1.7"></rect>
          <path d="M8.2 9.2h7.6M8.2 12h7.6M8.2 14.8h4.8" fill="none" stroke="#1f3b67" stroke-width="1.6" stroke-linecap="round"></path>
          <circle cx="17.2" cy="16.2" r="2.1" fill="#2563eb"></circle>
          <path d="M17.2 13.2v1M17.2 18.2v1M14.2 16.2h1M19.2 16.2h1M15.1 14.1l.7.7M18.6 17.6l.7.7M19.3 14.1l-.7.7M15.8 17.6l-.7.7" stroke="#2563eb" stroke-width="1.1" stroke-linecap="round"></path>
        </svg>
      `,
      engine: `
        <svg class="role-icon" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="3.1" fill="#2563eb"></circle>
          <path d="M12 2.8l1.4 2.5 2.8.6.6 2.8 2.5 1.4-1 2.7 1 2.7-2.5 1.4-.6 2.8-2.8.6-1.4 2.5-2.7-1-2.7 1-1.4-2.5-2.8-.6-.6-2.8-2.5-1.4 1-2.7-1-2.7 2.5-1.4.6-2.8 2.8-.6 1.4-2.5 2.7 1 2.7-1z" fill="none" stroke="#2563eb" stroke-width="1.6" stroke-linejoin="round"></path>
        </svg>
      `,
      orchestrator: `
        <svg class="role-icon" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="5" r="2.6" fill="#7c3aed"></circle>
          <circle cx="6" cy="18" r="2.6" fill="#7c3aed"></circle>
          <circle cx="18" cy="18" r="2.6" fill="#7c3aed"></circle>
          <path d="M10.8 7.2l-3.6 8.3M13.2 7.2l3.6 8.3M8.7 18h6.6" fill="none" stroke="#7c3aed" stroke-width="1.7" stroke-linecap="round"></path>
        </svg>
      `,
      bridge: `
        <svg class="role-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M5 7.5h14M5 16.5h14" fill="none" stroke="#0f766e" stroke-width="1.8" stroke-linecap="round"></path>
          <circle cx="7" cy="7.5" r="2.4" fill="#0f766e"></circle>
          <circle cx="17" cy="16.5" r="2.4" fill="#0f766e"></circle>
        </svg>
      `,
      bridge_worker: `
        <svg class="role-icon" viewBox="0 0 24 24" aria-hidden="true">
          <rect x="5" y="5" width="14" height="14" rx="3" fill="none" stroke="#0f766e" stroke-width="1.7"></rect>
          <path d="M9 12h6M12 9v6" fill="none" stroke="#0f766e" stroke-width="1.8" stroke-linecap="round"></path>
        </svg>
      `,
    };

    function setStatus(text, isError = false) {
      statusEl.textContent = text;
      statusEl.style.color = isError ? "#b42318" : "#2563eb";
    }

    function getNestedValue(obj, path) {
      return path.split(".").reduce((cur, key) => cur && cur[key], obj);
    }

    async function api(path, options = {}) {
      const res = await fetch(path, {
        headers: {"Content-Type": "application/json"},
        ...options,
      });
      if (!res.ok) throw new Error(await res.text());
      return res.headers.get("Content-Type")?.includes("application/json") ? res.json() : null;
    }

    async function loadConfig() {
      try {
        const data = await api("/api/config");
        renderConfig(data);
        setStatus("Config loaded");
      } catch (err) {
        setStatus("Config load failed", true);
      }
    }

    function renderConfig(data) {
      configPathEl.textContent = data.path;
      for (const input of document.querySelectorAll("[data-path]")) {
        const value = getNestedValue(data.config, input.dataset.path);
        if (input.type === "checkbox") input.checked = Boolean(value);
        else input.value = value ?? "";
      }
    }

    async function saveField(input) {
      let value;
      if (input.type === "checkbox") value = input.checked;
      else if (input.type === "number") value = Number.parseInt(input.value || "0", 10);
      else value = input.value;

      try {
        await api("/api/config", {
          method: "PATCH",
          body: JSON.stringify({path: input.dataset.path, value}),
        });
        setStatus("Saved");
      } catch (err) {
        setStatus("Save failed", true);
      }
    }

    function queueSave(input) {
      const key = input.dataset.path;
      clearTimeout(saveTimers.get(key));
      saveTimers.set(key, setTimeout(() => saveField(input), input.type === "checkbox" ? 0 : 300));
    }

    function formatAge(seconds) {
      if (seconds === null || seconds === undefined) return "";
      if (seconds < 60) return `${seconds}s`;
      const minutes = Math.floor(seconds / 60);
      const rest = seconds % 60;
      if (minutes < 60) return `${minutes}m ${rest}s`;
      return `${Math.floor(minutes / 60)}h ${minutes % 60}m`;
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;",
      }[char]));
    }

    function instanceUser(item) {
      if (item.user) return item.user;
      const parts = String(item.server || item.name || "").split("@");
      return parts.length >= 3 ? parts[1] : "";
    }

    function groupValue(item, column) {
      if (column === "age") return formatAge(item.age_seconds);
      if (column === "user") return instanceUser(item);
      return item[column] ?? "";
    }

    function sortValue(item, column) {
      if (column === "user") return instanceUser(item);
      if (column === "age_seconds") return item.age_seconds ?? Number.MAX_SAFE_INTEGER;
      return String(item[column] ?? "").toLowerCase();
    }

    function sortInstances(instances) {
      const direction = sortState.direction === "desc" ? -1 : 1;
      return [...instances].sort((left, right) => {
        const leftValue = sortValue(left, sortState.column);
        const rightValue = sortValue(right, sortState.column);
        if (leftValue < rightValue) return -1 * direction;
        if (leftValue > rightValue) return 1 * direction;
        return String(left.name || "").localeCompare(String(right.name || ""));
      });
    }

    function updateSortHeaders() {
      for (const button of document.querySelectorAll("[data-sort]")) {
        const isSorted = button.dataset.sort === sortState.column;
        button.classList.toggle("sorted", isSorted);
        button.classList.toggle("asc", isSorted && sortState.direction === "asc");
        button.classList.toggle("desc", isSorted && sortState.direction === "desc");
      }
    }

    function roleCell(item) {
      const icon = roleIcons[item.role] || "";
      return `<span class="role-cell">${icon}<span>${escapeHtml(item.role_label)}</span></span>`;
    }

    function renderInstanceRow(item) {
      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${roleCell(item)}</td>
        <td>${escapeHtml(instanceUser(item))}</td>
        <td>${escapeHtml(item.server)}</td>
        <td>${escapeHtml(item.created || "")}</td>
        <td>${escapeHtml(item.last_seen || "")}</td>
        <td class="age">${escapeHtml(formatAge(item.age_seconds))}</td>
        <td><span class="pill ${item.status === "Stale" ? "stale" : ""}">${escapeHtml(item.status)}</span></td>
        <td><button class="danger">Kill</button></td>
      `;
      row.querySelector("button").addEventListener("click", () => killInstance(item));
      return row;
    }

    function renderInstances(instances) {
      updateSortHeaders();
      const sortedInstances = sortInstances(instances);
      instancesBody.innerHTML = "";
      if (!sortedInstances.length) {
        instancesBody.innerHTML = `<tr><td class="empty" colspan="${instanceColumnCount}">No active JSON instances found.</td></tr>`;
        return;
      }

      const groupBy = groupByInstances.value;
      if (!groupBy) {
        for (const item of sortedInstances) instancesBody.appendChild(renderInstanceRow(item));
        return;
      }

      const groups = new Map();
      for (const item of sortedInstances) {
        const value = groupValue(item, groupBy);
        const label = value || "(blank)";
        if (!groups.has(label)) groups.set(label, []);
        groups.get(label).push(item);
      }

      for (const [label, items] of groups) {
        const groupRow = document.createElement("tr");
        groupRow.className = "group-row";
        groupRow.innerHTML = `<td colspan="${instanceColumnCount}">${escapeHtml(label)}<span class="group-count">${items.length}</span></td>`;
        instancesBody.appendChild(groupRow);
        for (const item of items) instancesBody.appendChild(renderInstanceRow(item));
      }
    }

    async function loadInstances() {
      try {
        const data = await api("/api/instances");
        latestInstances = data.instances;
        renderInstances(latestInstances);
      } catch (err) {
        instancesBody.innerHTML = `<tr><td class="empty" colspan="${instanceColumnCount}">Failed to load instances.</td></tr>`;
      }
    }

    async function killInstance(item) {
      if (!confirm(`Remove heartbeat for ${item.server}?`)) return;
      try {
        await api(`/api/instances?role=${encodeURIComponent(item.role)}&name=${encodeURIComponent(item.name)}`, {
          method: "DELETE",
        });
        setStatus("Shutdown requested");
        loadInstances();
      } catch (err) {
        setStatus("Kill failed", true);
      }
    }

    async function clearStaleInstances() {
      const staleCount = latestInstances.filter(item => item.status === "Stale").length;
      if (!staleCount) {
        setStatus("No stale instances");
        return;
      }
      if (!confirm(`Remove ${staleCount} stale heartbeat${staleCount === 1 ? "" : "s"}?`)) return;
      try {
        const data = await api("/api/clear-stale-instances", {method: "POST"});
        latestInstances = data.instances;
        renderInstances(latestInstances);
        setStatus(`Removed ${data.removed} stale instance${data.removed === 1 ? "" : "s"}`);
      } catch (err) {
        setStatus("Clear stale failed", true);
      }
    }

    async function startOrchestrator() {
      try {
        const data = await api("/api/start-orchestrator", {method: "POST"});
        latestInstances = data.instances;
        renderInstances(latestInstances);
        setStatus(`Orchestrator started (PID ${data.pid})`);
        setTimeout(loadInstances, 1500);
      } catch (err) {
        setStatus("Start orchestrator failed", true);
      }
    }

    async function startBridge() {
      try {
        const data = await api("/api/start-bridge", {method: "POST"});
        latestInstances = data.instances;
        renderInstances(latestInstances);
        if (data.started === false) {
          setStatus(data.message || "Bridge not started", true);
          return;
        }
        setStatus(`Bridge started (PID ${data.pid})`);
        setTimeout(loadInstances, 1500);
      } catch (err) {
        setStatus("Start bridge failed", true);
      }
    }

    function closeAdminPage() {
      window.close();
      document.body.innerHTML = "<main class=\"app\"><section><h1>ArcRho Admin Control Closed</h1></section></main>";
    }

    async function checkAdminServer() {
      try {
        await api("/api/health");
      } catch (err) {
        closeAdminPage();
      }
    }

    for (const input of document.querySelectorAll("[data-path]")) {
      input.addEventListener("input", () => queueSave(input));
      input.addEventListener("change", () => queueSave(input));
    }

    document.getElementById("refreshInstances").addEventListener("click", loadInstances);
    document.getElementById("clearStaleInstances").addEventListener("click", clearStaleInstances);
    document.getElementById("startOrchestrator").addEventListener("click", startOrchestrator);
    document.getElementById("startBridge").addEventListener("click", startBridge);
    groupByInstances.addEventListener("change", () => renderInstances(latestInstances));
    for (const button of document.querySelectorAll("[data-sort]")) {
      button.addEventListener("click", () => {
        const column = button.dataset.sort;
        if (sortState.column === column) {
          sortState.direction = sortState.direction === "asc" ? "desc" : "asc";
        } else {
          sortState = {column, direction: "asc"};
        }
        renderInstances(latestInstances);
      });
    }
    document.getElementById("openConfigFolder").addEventListener("click", () => api("/api/open-config-folder", {method: "POST"}));
    document.getElementById("resetConfig").addEventListener("click", async () => {
      if (!confirm("Reset Admin Control settings to default mode?")) return;
      try {
        const data = await api("/api/reset-config", {method: "POST"});
        renderConfig(data);
        setStatus("Defaults restored");
      } catch (err) {
        setStatus("Reset failed", true);
      }
    });
    document.getElementById("shutdownServer").addEventListener("click", async () => {
      await api("/api/shutdown", {method: "POST"});
      setStatus("Admin server closed");
      setTimeout(closeAdminPage, 200);
    });

    loadConfig();
    loadInstances();
    setInterval(loadInstances, 5000);
    setInterval(checkAdminServer, 2000);
  </script>
</body>
</html>
