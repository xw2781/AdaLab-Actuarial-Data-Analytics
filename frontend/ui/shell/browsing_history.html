<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Browsing History</title>
  <style>
    :root {
      --border: #d8d8d8;
      --bg: #ffffff;
      --text: #222;
      --muted: #666;
      --hover: #f4f4f4;
    }
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, "Segoe UI", "SegoeUI", Tahoma, sans-serif;
    }
    .page {
      box-sizing: border-box;
      height: 100%;
      padding: 14px;
      overflow: auto;
    }
    .title {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
    }
    .subtitle {
      margin: 6px 0 12px;
      font-size: 12px;
      color: var(--muted);
    }
    .empty {
      border: 1px dashed var(--border);
      border-radius: 10px;
      padding: 16px;
      font-size: 13px;
      color: var(--muted);
      background: #fcfcfc;
    }
    .list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .historyRow {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fafafa;
      text-align: left;
      cursor: pointer;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-family: inherit;
    }
    .historyRow:hover {
      background: var(--hover);
      border-color: #bdbdbd;
    }
    .lineTop {
      display: flex;
      gap: 10px;
      align-items: baseline;
    }
    .project {
      font-size: 14px;
      font-weight: 700;
      color: #111;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1 1 auto;
    }
    .dataset {
      font-size: 12px;
      color: #2c2c2c;
      max-width: 48%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 0 0 auto;
    }
    .path {
      font-size: 12px;
      color: #4d4d4d;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .time {
      font-size: 11px;
      color: #757575;
    }
  </style>
</head>
<body>
  <main class="page">
    <h1 class="title">Browsing History</h1>
    <p class="subtitle">Recent project, reserving class, and dataset views.</p>
    <div id="historyEmpty" class="empty">No browsing history yet.</div>
    <div id="historyList" class="list" aria-label="Browsing History List"></div>
  </main>

  <script type="module" src="/ui/shell/browsing_history_main.js?v=20260521a"></script>
</body>
</html>
