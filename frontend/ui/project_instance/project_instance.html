<!doctype html>
<html>
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Project Instance</title>
  <link rel="stylesheet" href="/ui/shared/scrollbars.css?v=20260516a"/>
  <style>
    :root {
      --border: #d9dee8;
      --text: #20242a;
      --muted: #667085;
      --panel-bg: #fff;
      --header-bg: #f5f7fb;

    html, body {

      margin: 0;
    }
    body {

      color: var(--text);
      background: #fff;
      overflow: hidden;
      user-select: none;
    }
    input, iframe {

    }

    }
    body.resizing-left-panel iframe {

    }
    body.resizing-left-panel .pi-layout {

    .pi-root {

      position: relative;

      bottom: 0;
